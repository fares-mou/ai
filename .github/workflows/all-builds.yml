name: AI-SOC Sentinel Full Builds

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  BUILD_NUMBER: 1
  BUILD_VERSION: 1.0.0
  PYTHON_VERSION: 3.10.11 # نستخدم 3.10 لضمان توافق sklearn و scapy
  FLUTTER_VERSION: 3.22.2

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install Dependencies
      run: |
        chcp 65001
        python -m pip install --upgrade pip
        # تثبيت flet والمكتبات الأمنية والذكاء الاصطناعي
        pip install flet scapy pandas numpy joblib scikit-learn pyinstaller

    - name: Flet Build Windows (EXE)
      shell: bash
      env:
        PYTHONIOENCODING: utf-8
        PYTHONUTF8: 1
      run: |
        chcp 65001
        # استخدام flet build مع تضمين المكتبات الضخمة يدوياً عبر pyinstaller_args
        # تأكد من أن أسماء الملفات ai_agent.py و gui.py صحيحة في مستودعك
        flet build windows --verbose --no-rich-output \
          --product "AI-SOC Sentinel" \
          --build-number=$BUILD_NUMBER \
          --build-version=$BUILD_VERSION \
          --patch-version=$BUILD_NUMBER \
          --pyinstaller-args "--collect-all sklearn --collect-all scipy --collect-all pandas --collect-all numpy --add-data 'ai_agent.py;.' --add-data 'gui.py;.'"

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AI-SOC-Sentinel-Windows
        path: build/windows
        if-no-files-found: error

  build-apk:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        # ملاحظة: sklearn لا تعمل داخل APK مباشرة، سيتم بناؤها كواجهة فقط
        pip install flet

    - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Flet Build APK
      run: |
        flet build apk --verbose --build-number=$BUILD_NUMBER --build-version=$BUILD_VERSION

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AI-SOC-Sentinel-APK
        path: build/apk
